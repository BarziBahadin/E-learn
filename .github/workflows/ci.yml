name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  NODE_VERSION: 22.13.1
  PNPM_VERSION: 11.9.0

jobs:
  application:
    name: Typecheck, test, and export
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies from lockfile
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Validate Expo dependencies
        run: pnpm exec expo install --check

      - name: Resolve public Expo configuration
        run: pnpm exec expo config --type public > /tmp/expo-public-config.json
        env:
          EXPO_PUBLIC_APP_MODE: production
          EXPO_PUBLIC_ENABLE_DEMO_APP: "false"

      - name: Export production web bundle
        run: pnpm exec expo export --platform web --output-dir dist-ci
        env:
          EXPO_PUBLIC_APP_MODE: production
          EXPO_PUBLIC_ENABLE_DEMO_APP: "false"

  database:
    name: Validate Supabase migrations
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Start local Supabase services
        run: supabase start

      - name: Rebuild database from migrations
        run: supabase db reset --local

      - name: Lint database schema
        run: supabase db lint --local --level warning

      - name: Stop local Supabase services
        if: always()
        run: supabase stop --no-backup
